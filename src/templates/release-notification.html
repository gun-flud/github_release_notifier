<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>New Release</title>
</head>
<body style="background-color: #f6f8fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 40px 20px;">
  
  <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; border: 1px solid #e1e4e8; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.04);">
    <tr>
      <td style="background-color: #0366d6; padding: 30px; text-align: center;">
        <h1 style="color: #ffffff; margin: 0; font-size: 24px; font-weight: 600;">🚀 New Release Published!</h1>
      </td>
    </tr>
    
    <tr>
      <td style="padding: 40px 30px;">
        <p style="color: #586069; font-size: 16px; line-height: 1.6; margin-top: 0; margin-bottom: 20px;">
          Great news! A new version of a repository you are tracking has just dropped.
        </p>
        
        <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f1f8ff; border: 1px solid #c8e1ff; border-radius: 6px; margin-bottom: 30px;">
          <tr>
            <td style="padding: 20px; text-align: center;">
              <div style="color: #24292e; font-size: 18px; font-weight: 600; margin-bottom: 8px;">{{repoName}}</div>
              <div style="display: inline-block; background-color: #0366d6; color: white; padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: 600; font-family: monospace;">
                {{releaseTag}}
              </div>
            </td>
          </tr>
        </table>
        
        <table width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td align="center" style="padding: 0 0 30px 0;">
              <a href="{{releaseUrl}}" style="background-color: #24292e; color: #ffffff; padding: 14px 28px; text-decoration: none; border-radius: 6px; font-size: 16px; font-weight: 600; display: inline-block;">
                View Release Notes
              </a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
    
    <tr>
      <td style="background-color: #fafbfc; border-top: 1px solid #eaecef; padding: 20px 30px; text-align: center;">
        <p style="color: #6a737d; font-size: 12px; margin: 0; margin-bottom: 10px;">
          You are receiving this because you subscribed to updates for <strong>{{repoName}}</strong>.
        </p>
        <a href="{{unsubUrl}}" style="color: #d73a49; font-size: 12px; text-decoration: underline;">
          Unsubscribe from this repository
        </a>
      </td>
    </tr>
  </table>

</body>
</html>
